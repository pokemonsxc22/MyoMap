kind = "web"
previewPath = "/"
title = "AI Mobility Coach"
version = "1.0.0"
id = "artifacts/ai-mobility-coach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22044

[services.development]
run = "pnpm --filter @workspace/ai-mobility-coach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-mobility-coach", "run", "build" ]
publicDir = "artifacts/ai-mobility-coach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22044"
BASE_PATH = "/"
